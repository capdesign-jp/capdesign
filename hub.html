<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cap Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08080d;
    --bg-soft: #0f0f18;
    --pink: #ff2e88;
    --cyan: #00e5ff;
    --purple: #a855f7;
    --text: #eceaf4;
    --muted: #6f6c85;
    --line: #1c1b28;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  /* ambient grid background */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 20%, black 20%, transparent 75%);
    opacity: 0.5;
    z-index: 0;
  }

  main {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    padding: 72px 24px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .avatar {
    width: 104px;
    height: 104px;
    border-radius: 22px;
    margin-bottom: 24px;
    box-shadow: 0 0 0 1px var(--line), 0 0 44px -6px var(--pink), 0 0 44px -6px var(--cyan);
    object-fit: cover;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(28px, 7vw, 40px);
    letter-spacing: 0.04em;
    text-align: center;
    color: #fff;
    text-shadow:
      0 0 8px rgba(255, 46, 136, 0.7),
      0 0 24px rgba(255, 46, 136, 0.4),
      0 0 48px rgba(0, 229, 255, 0.15);
    animation: flicker 6s ease-in-out infinite;
  }

  @keyframes flicker {
    0%, 92%, 100% { opacity: 1; }
    93% { opacity: 0.6; }
    94% { opacity: 1; }
    95% { opacity: 0.75; }
    96% { opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    h1 { animation: none; }
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.15em;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .tagline {
    color: var(--muted);
    font-size: 14.5px;
    text-align: center;
    margin-top: 14px;
    max-width: 340px;
    line-height: 1.6;
  }

  nav {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 44px;
  }

  .link-card {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    padding: 18px 20px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 12px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
  }

  .link-card:hover,
  .link-card:focus-visible {
    transform: translateY(-2px);
    outline: none;
  }

  .link-card.booth:hover, .link-card.booth:focus-visible {
    border-color: var(--pink);
    box-shadow: 0 0 24px -6px var(--pink);
  }
  .link-card.coconala:hover, .link-card.coconala:focus-visible {
    border-color: var(--cyan);
    box-shadow: 0 0 24px -6px var(--cyan);
  }
  .link-card.x:hover, .link-card.x:focus-visible {
    border-color: var(--purple);
    box-shadow: 0 0 24px -6px var(--purple);
  }

  .icon {
    width: 40px;
    height: 40px;
    flex-shrink: 0;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
    font-size: 13px;
  }

  .booth .icon { background: rgba(255, 46, 136, 0.12); color: var(--pink); }
  .coconala .icon { background: rgba(0, 229, 255, 0.12); color: var(--cyan); }
  .x .icon { background: rgba(168, 85, 247, 0.12); color: var(--purple); }

  .link-text { flex: 1; }

  .link-title {
    font-weight: 600;
    font-size: 15.5px;
  }

  .link-sub {
    color: var(--muted);
    font-size: 12.5px;
    margin-top: 2px;
  }

  .arrow {
    color: var(--muted);
    font-size: 18px;
  }

  section.strip {
    width: 100%;
    margin-top: 56px;
  }

  .strip-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .swatches {
    display: flex;
    gap: 8px;
  }

  .swatch {
    flex: 1;
    height: 40px;
    border-radius: 8px;
    border: 1px solid var(--line);
  }

  footer {
    margin-top: 64px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-align: center;
  }
</style>
</head>
<body>
<main>
  <img class="avatar" src="cap-design-icon.png" alt="Cap Design ロゴ">
  <p class="eyebrow">Stream Overlay Shop</p>
  <h1>Cap Design</h1>
  <p class="tagline">配信用ネオンオーバーレイ素材の制作・販売。既製セットはBOOTH、オーダーメイドはココナラで承っています。</p>

  <nav>
    <a class="link-card booth" href="https://booth.pm/" target="_blank" rel="noopener">
      <div class="icon">BTH</div>
      <div class="link-text">
        <div class="link-title">BOOTH — 既製素材を見る</div>
        <div class="link-sub">開始・終了・待機画面/五色バリエーション</div>
      </div>
      <div class="arrow">→</div>
    </a>

    <a class="link-card coconala" href="https://coconala.com/" target="_blank" rel="noopener">
      <div class="icon">ココ</div>
      <div class="link-text">
        <div class="link-title">ココナラ — オーダーメイド依頼</div>
        <div class="link-sub">配信者ごとのカスタムデザインを制作</div>
      </div>
      <div class="arrow">→</div>
    </a>

    <a class="link-card x" href="https://x.com/" target="_blank" rel="noopener">
      <div class="icon">X</div>
      <div class="link-text">
        <div class="link-title">X（Twitter）— 最新作をチェック</div>
        <div class="link-sub">新作の告知・無料配布情報</div>
      </div>
      <div class="arrow">→</div>
    </a>
  </nav>

  <section class="strip">
    <p class="strip-label">Color Lineup</p>
    <div class="swatches">
      <div class="swatch" style="background:#ff2e88"></div>
      <div class="swatch" style="background:#00e5ff"></div>
      <div class="swatch" style="background:#a855f7"></div>
      <div class="swatch" style="background:#39ff6a"></div>
      <div class="swatch" style="background:#ffe93b"></div>
    </div>
  </section>

  <footer>© 2026 Cap Design</footer>
</main>
</body>
</html>
